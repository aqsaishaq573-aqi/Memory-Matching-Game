<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matching Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        #gameHeader {
            text-align: center;
            margin-bottom: 30px;
        }

        #gameHeader h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .stat {
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }

        .stat label {
            display: block;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat span {
            display: block;
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
        }

        #gameBoard {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            aspect-ratio: 1;
            background-color: #667eea;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            color: #fff;
            cursor: pointer;
            border-radius: 12px;
            user-select: none;
            transition: all 0.3s ease;
            border: none;
            font-weight: bold;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .card.flipped {
            background-color: #fff;
            color: #333;
        }

        .card.matched {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #fff;
            cursor: default;
            box-shadow: 0 4px 15px rgba(132, 250, 176, 0.4);
        }

        .card.matched:hover {
            transform: none;
        }

        .card.disabled {
            pointer-events: none;
        }

        #winMessage {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            animation: slideIn 0.5s ease-out;
        }

        #winMessage.show {
            display: block;
        }

        #winMessage h2 {
            font-size: 2em;
            color: #fff;
            margin-bottom: 10px;
        }

        #winMessage p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #resetBtn {
            background: #667eea;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        #resetBtn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .difficulty-selector {
            margin-bottom: 30px;
            text-align: center;
        }

        .difficulty-selector label {
            margin-right: 15px;
            font-weight: bold;
            color: #333;
        }

        .difficulty-selector select {
            padding: 8px 15px;
            border-radius: 5px;
            border: 2px solid #667eea;
            color: #333;
            font-size: 1em;
            cursor: pointer;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes flip {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(180deg);
            }
        }

        .audio-toggle {
            text-align: center;
            margin-bottom: 20px;
        }

        .audio-toggle button {
            padding: 8px 20px;
            font-size: 0.9em;
            background: #764ba2;
            color: white;
        }

        .audio-toggle button:hover {
            background: #667eea;
        }

        @media (max-width: 480px) {
            #gameBoard {
                grid-template-columns: repeat(3, 1fr);
            }

            #gameHeader h2 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="gameHeader">
            <h2>🎮 Memory Game</h2>
            
            <div class="difficulty-selector">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy (8 pairs)</option>
                    <option value="medium" selected>Medium (12 pairs)</option>
                    <option value="hard">Hard (16 pairs)</option>
                </select>
            </div>

            <div class="audio-toggle">
                <button id="soundToggle">🔊 Sound ON</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <label>Moves</label>
                    <span id="moves">0</span>
                </div>
                <div class="stat">
                    <label>Time</label>
                    <span id="timer">0</span>s
                </div>
                <div class="stat">
                    <label>Pairs Found</label>
                    <span id="pairsFound">0</span>
                </div>
            </div>
        </div>

        <div id="winMessage">
            <h2>🎉 You Win!</h2>
            <p>Moves: <span id="finalMoves">0</span></p>
            <p>Time: <span id="finalTime">0</span> seconds</p>
        </div>

        <div id="gameBoard"></div>

        <div class="button-group">
            <button id="resetBtn">Reset Game</button>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="matchSound" preload="auto">
        <source src="correct match.mp3" type="audio/mpeg">
    </audio>
    <audio id="wrongSound" preload="auto">
        <source src="fahhhhh.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound" preload="auto">
        <source src="Win.mp3" type="audio/mpeg">
    </audio>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Game Configuration
        const CARD_SYMBOLS = ['🌟', '🎨', '🎭', '🎪', '🎯', '🎲', '🎸', '🎺', 
                              '🏀', '🎾', '⚽', '🏐', '🍕', '🍔', '🍰', '🍎'];

        const DIFFICULTY_LEVELS = {
            easy: 8,
            medium: 12,
            hard: 16
        };

        // Game State
        let gameState = {
            cards: [],
            flipped: [],
            matched: [],
            moves: 0,
            pairsFound: 0,
            timer: 0,
            isGameActive: true,
            canFlip: true,
            timerInterval: null,
            soundEnabled: true,
            difficulty: 'medium'
        };

        // Initialize Game
        $(document).ready(function() {
            initializeGame();
            setupEventListeners();
        });

        /**
         * Initialize the game board with cards and reset game state
         */
        function initializeGame() {
            const pairsCount = DIFFICULTY_LEVELS[gameState.difficulty];
            const selectedSymbols = CARD_SYMBOLS.slice(0, pairsCount);
            
            // Create pairs and shuffle
            gameState.cards = [];
            selectedSymbols.forEach(symbol => {
                gameState.cards.push({ symbol, id: gameState.cards.length });
                gameState.cards.push({ symbol, id: gameState.cards.length });
            });
            
            gameState.cards = shuffleArray(gameState.cards);
            gameState.flipped = [];
            gameState.matched = [];
            gameState.moves = 0;
            gameState.pairsFound = 0;
            gameState.timer = 0;
            gameState.isGameActive = true;
            gameState.canFlip = true;

            // Clear previous timer
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }

            // Render board
            renderBoard();
            updateUI();

            // Hide win message
            $('#winMessage').removeClass('show');
        }

        /**
         * Setup event listeners for all interactive elements
         */
        function setupEventListeners() {
            // Card click event
            $(document).on('click', '.card:not(.matched)', function() {
                if (!gameState.canFlip || !gameState.isGameActive) return;
                
                const index = $(this).data('index');
                
                // Don't flip the same card twice
                if (gameState.flipped.includes(index)) return;
                
                flipCard(index);
            });

            // Reset button
            $('#resetBtn').on('click', function() {
                initializeGame();
            });

            // Sound toggle button
            $('#soundToggle').on('click', function() {
                gameState.soundEnabled = !gameState.soundEnabled;
                const icon = gameState.soundEnabled ? '🔊' : '🔇';
                const text = gameState.soundEnabled ? 'ON' : 'OFF';
                $(this).text(`${icon} Sound ${text}`);
            });

            // Difficulty selector
            $('#difficulty').on('change', function() {
                gameState.difficulty = $(this).val();
                initializeGame();
            });
        }

        /**
         * Flip a card at the given index
         * @param {number} index - The index of the card to flip
         */
        function flipCard(index) {
            // Start timer on first flip
            if (gameState.flipped.length === 0 && gameState.timer === 0) {
                startTimer();
            }

            // Flip the card
            gameState.flipped.push(index);
            const $card = $(`[data-index="${index}"]`);
            $card.addClass('flipped').text(gameState.cards[index].symbol);

            // Check if two cards are flipped
            if (gameState.flipped.length === 2) {
                gameState.canFlip = false;
                gameState.moves++;
                updateUI();
                
                setTimeout(() => {
                    checkMatch();
                }, 600);
            }
        }

        /**
         * Check if the two flipped cards match
         */
        function checkMatch() {
            const [index1, index2] = gameState.flipped;
            const card1 = gameState.cards[index1];
            const card2 = gameState.cards[index2];

            if (card1.symbol === card2.symbol) {
                // Match found!
                playSound('matchSound');
                gameState.matched.push(index1, index2);
                gameState.pairsFound++;
                
                $(`[data-index="${index1}"], [data-index="${index2}"]`)
                    .addClass('matched')
                    .removeClass('flipped');

                gameState.flipped = [];
                gameState.canFlip = true;

                updateUI();

                // Check win condition
                if (gameState.matched.length === gameState.cards.length) {
                    winGame();
                }
            } else {
                // No match
                playSound('wrongSound');
                
                // Flip cards back
                const $card1 = $(`[data-index="${index1}"]`);
                const $card2 = $(`[data-index="${index2}"]`);
                
                $card1.removeClass('flipped').text('');
                $card2.removeClass('flipped').text('');

                gameState.flipped = [];
                gameState.canFlip = true;
            }
        }

        /**
         * Handle win condition - display win message and stop game
         */
        function winGame() {
            gameState.isGameActive = false;
            gameState.canFlip = false;
            
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
            }

            playSound('winSound');

            // Show win message
            $('#finalMoves').text(gameState.moves);
            $('#finalTime').text(gameState.timer);
            $('#winMessage').addClass('show');
        }

        /**
         * Start the game timer - increments every second
         */
        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timer++;
                $('#timer').text(gameState.timer);
            }, 1000);
        }

        /**
         * Render the game board with all cards
         */
        function renderBoard() {
            const $gameBoard = $('#gameBoard');
            $gameBoard.empty();

            gameState.cards.forEach((card, index) => {
                const isMatched = gameState.matched.includes(index);
                const isFlipped = gameState.flipped.includes(index);
                
                let className = 'card';
                if (isMatched) className += ' matched';
                if (isFlipped) className += ' flipped';

                const $card = $(`<button class="${className}" data-index="${index}"></button>`);
                
                if (isFlipped || isMatched) {
                    $card.text(card.symbol);
                }

                $gameBoard.append($card);
            });
        }

        /**
         * Update the UI with current game statistics
         */
        function updateUI() {
            $('#moves').text(gameState.moves);
            $('#timer').text(gameState.timer);
            $('#pairsFound').text(gameState.pairsFound);
        }

        /**
         * Play a sound effect if sound is enabled
         * @param {string} soundId - The ID of the audio element to play
         */
        function playSound(soundId) {
            if (!gameState.soundEnabled) return;
            
            const audio = document.getElementById(soundId);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        /**
         * Shuffle an array using Fisher-Yates algorithm
         * @param {array} array - The array to shuffle
         * @returns {array} - The shuffled array
         */
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
    </script>
</body>
</html>
